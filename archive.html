<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teodors Lapsa | Archive</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23961a24'/></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Noņem atstarpes/robežas STARP bildēm, patur vienu robežu APKĀRT visam blokam */
    .archive-container {
      gap: 0;
      border: 1px solid #ffffff;
    }
    .image-square {
      border: none;
      outline: none;
    }
    .image-square img {
      display: block;
      border: none;
      outline: none;
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="enindex.html" class="nav-logo">TEODORS LAPSA</a>

    <button class="menu-toggle" aria-label="Open menu">
      <span></span>
      <span></span>
    </button>

    <div class="nav-links">
      <a href="work.html" class="nav-item">work</a>
      <a href="contact.html" class="nav-item">contact</a>
      <a href="archive.html" class="nav-item active-page">archive</a>
      <a href="arhīvs.html" class="nav-item lang-btn">lv</a>

      <div class="nav-right-features">
        <a href="https://instagram.com/teodorslapsa" target="_blank" class="nav-ig-icon" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
        </a>
      </div>
    </div>
  </nav>

  <!-- ARCHIVE SECTION -->
  <main class="archive-page-wrapper">
    <a href="en_bilzuarhivs.html" class="archive-hero-link">

      <h1 class="archive-title aurora-title">picture archive
        <div class="aurora">
          <div class="aurora__item"></div>
          <div class="aurora__item"></div>
          <div class="aurora__item"></div>
          <div class="aurora__item"></div>
        </div>
      </h1>

      <div class="archive-container">
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
      </div>
    </a>
  </main>

  <script>
    // 0. Pārvieto IG ikonu navigācijas iekšpusē (ja tā vēl nav tur)
    const navRightFeatures = document.querySelector('.nav-right-features');
    const navLinksContainer = document.querySelector('.nav-links');
    if (navRightFeatures && navLinksContainer && !navLinksContainer.contains(navRightFeatures)) {
      navLinksContainer.appendChild(navRightFeatures);
    }

    // 1. Mobile menu toggle (was completely missing — that's why it didn't work)
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      navLinks.classList.toggle('active');
    });

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        menuToggle.classList.remove('active');
        navLinks.classList.remove('active');
      });
    });

    // 2. Archive image carousel
    document.addEventListener("DOMContentLoaded", () => {

      const totalImages = 150;
      const imageFolder = "https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/";
      const baseName = "bildesarhivs";
      const extension = ".jpg";

      // 1. Generate list of all 150 images
      let archiveImages = [];
      for (let i = 1; i <= totalImages; i++) {
        let numStr = String(i).padStart(3, '0');
        archiveImages.push(`${imageFolder}${baseName}${numStr}${extension}`);
      }

      // 2. Shuffle images randomly
      archiveImages.sort(() => Math.random() - 0.5);

      const squares = document.querySelectorAll('.image-square');

      // 3. Automatically distribute shuffled images into the 6 squares
      archiveImages.forEach((imgSrc, index) => {
        const squareIndex = index % squares.length;

        const imgEl = document.createElement('img');
        imgEl.src = imgSrc;
        imgEl.alt = "Archive image";
        imgEl.loading = "lazy";

        if (squares[squareIndex].children.length === 0) {
          imgEl.classList.add('active');
        }

        squares[squareIndex].appendChild(imgEl);
      });

      // 4. Animation for fading images
      function startSequence() {
        changeImage(squares[0]);

        setTimeout(() => { changeImage(squares[1]); }, 1000);
        setTimeout(() => { changeImage(squares[2]); }, 2000);
        setTimeout(() => { changeImage(squares[3]); }, 3000);
        setTimeout(() => { changeImage(squares[4]); }, 4000);

        setTimeout(() => {
          changeImage(squares[5]);
          setTimeout(startSequence, 1000);
        }, 5000);
      }

      function changeImage(square) {
        const images = square.querySelectorAll('img');
        if (images.length < 2) return;

        const currentActive = square.querySelector('img.active');
        if (!currentActive) return;

        let nextActive = currentActive.nextElementSibling;

        if (!nextActive) {
          nextActive = images[0];
        }

        currentActive.classList.remove('active');
        nextActive.classList.add('active');
      }

      startSequence();
    });
  </script>
</body>
</html>
