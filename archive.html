  <!-- ARCHIVE SECTION -->
  <main class="archive-page-wrapper">
    <a href="en_bilzuarhivs.html" class="archive-hero-link">
      
      <h1 class="archive-title">PHOTO ARCHIVE</h1>
      
      <div class="archive-container">
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
        <div class="image-square"></div>
      </div>
    </a>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      
      // Jaunais, pareizais kods:
const totalImages = 150; 
const imageFolder = "https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/";
const baseName = "bildesarhivs";
      const extension = ".jpg";

      // 1. Generate list of all 150 images
      let archiveImages = [];
      for (let i = 1; i <= totalImages; i++) {
        let numStr = String(i).padStart(3, '0');
        archiveImages.push(`${imageFolder}${baseName}${numStr}${extension}`);
      }

      // 2. Shuffle images randomly
      archiveImages.sort(() => Math.random() - 0.5);

      const squares = document.querySelectorAll('.image-square');

      // 3. Automatically distribute shuffled images into the 6 squares
      archiveImages.forEach((imgSrc, index) => {
        const squareIndex = index % squares.length; 
        
        const imgEl = document.createElement('img');
        imgEl.src = imgSrc;
        imgEl.alt = "Archive image";
        imgEl.loading = "lazy"; 
        
        if (squares[squareIndex].children.length === 0) {
          imgEl.classList.add('active');
        }
        
        squares[squareIndex].appendChild(imgEl);
      });

      // 4. Animation for fading images
      function startSequence() {
        changeImage(squares[0]);
        
        setTimeout(() => { changeImage(squares[1]); }, 1000);
        setTimeout(() => { changeImage(squares[2]); }, 2000);
        setTimeout(() => { changeImage(squares[3]); }, 3000);
        setTimeout(() => { changeImage(squares[4]); }, 4000);
        
        setTimeout(() => { 
          changeImage(squares[5]); 
          setTimeout(startSequence, 1000);
        }, 5000);
      }

      function changeImage(square) {
        const images = square.querySelectorAll('img');
        if (images.length < 2) return; 

        const currentActive = square.querySelector('img.active');
        if (!currentActive) return;

        let nextActive = currentActive.nextElementSibling;

        if (!nextActive) {
          nextActive = images[0];
        }

        currentActive.classList.remove('active');
        nextActive.classList.add('active');
      }

      startSequence();
    });
  </script>
</body>
