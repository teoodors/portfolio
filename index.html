  <script>
    // Mobilās izvēlnes loģika
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      navLinks.classList.toggle('active');
    });

    // Aizver izvēlni, ja tiek uzspiests uz kādas saites (piemēram, enkursaites)
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        menuToggle.classList.remove('active');
        navLinks.classList.remove('active');
      });
    });

    // Bezgalīgās karuseļa ritināšanas loģika
    document.querySelectorAll('.collage-row').forEach(row => {
      let isDown = false;
      let startX;
      let scrollLeft;

      // Peles / Touch vilkšana
      row.addEventListener('mousedown', e => {
        isDown = true;
        row.classList.add('dragging');
        startX = e.pageX - row.offsetLeft;
        scrollLeft = row.scrollLeft;
      });

      row.addEventListener('dragstart', e => e.preventDefault());
      row.addEventListener('mouseleave', () => { isDown = false; row.classList.remove('dragging'); });
      row.addEventListener('mouseup', () => { isDown = false; row.classList.remove('dragging'); });

      row.addEventListener('mousemove', e => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - row.offsetLeft;
        const walk = (x - startX) * 1.2; 
        row.scrollLeft = scrollLeft - walk;
      });

      // Gluda bezgalīgā ritināšana
      row.addEventListener('scroll', () => {
        const halfWidth = row.scrollWidth / 2;

        if (row.scrollLeft >= halfWidth) {
          row.scrollLeft = row.scrollLeft % halfWidth;
        } else if (row.scrollLeft <= 0) {
          row.scrollLeft = halfWidth + (row.scrollLeft % halfWidth);
        }
      });
    });
  </script>
