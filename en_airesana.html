  <div id="popup-overlay" class="popup-overlay">
    <button class="popup-close">&times;</button>
    
    <button class="popup-nav prev" aria-label="Previous">
      <svg viewBox="0 0 100 100"><path d="M70 10 L30 50 L70 90" fill="none" stroke="white" stroke-width="2"/></svg>
    </button>

    <div class="popup-content">
      <img id="popup-img" src="" alt="Enlarged image">
    </div>

    <button class="popup-nav next" aria-label="Next">
      <svg viewBox="0 0 100 100"><path d="M30 10 L70 50 L30 90" fill="none" stroke="white" stroke-width="2"/></svg>
    </button>
  </div>

  <footer>
    &copy; 2026 Teodors Lapsa &nbsp;·&nbsp; teodorslapsa.lv

  <script>
    // 1. Mobilā menu loģika
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');
    if (menuToggle && navLinks) {
      menuToggle.addEventListener('click', () => {
        menuToggle.classList.toggle('active');
        navLinks.classList.toggle('active');
      });
    }

    // 2. POPUP LIGHTBOX LOĢIKA
    const images = document.querySelectorAll('.project-gallery img');
    const overlay = document.getElementById('popup-overlay');
    const popupImg = document.getElementById('popup-img');
    const closeBtn = document.querySelector('.popup-close');
    const prevBtn = document.querySelector('.popup-nav.prev');
    const nextBtn = document.querySelector('.popup-nav.next');
    
    let currentIndex = 0;

    images.forEach((img, index) => {
      img.addEventListener('click', () => {
        currentIndex = index;
        openPopup();
      });
    });

    function openPopup() {
      popupImg.src = images[currentIndex].src;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closePopup() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % images.length;
      popupImg.src = images[currentIndex].src;
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      popupImg.src = images[currentIndex].src;
    }

    closeBtn.addEventListener('click', closePopup);
    nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
    prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
    
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.classList.contains('popup-content')) {
        closePopup();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (!overlay.classList.contains('active')) return;
      if (e.key === "Escape") closePopup();
      if (e.key === "ArrowRight") showNext();
      if (e.key === "ArrowLeft") showPrev();
    });

    // 3. UNIVERSĀLAIS RANDOM PROJEKTU ĢENERATORS UN KARTĪŠU STRUKTŪRA
    const visiProjekti = [
      { url: 'en_airesana.html', bgImage: 'https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/airesana.jpg', title: 'Rowing Training' },
      { url: 'en_frekvencu.html', bgImage: 'https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/frekvencu.jpg', title: 'Frequency Chaos .2' },
      { url: 'en_volejbols.html', bgImage: 'https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/U19V.jpg', title: 'U19 Volleyball' },
      { url: 'en_futbols.html', bgImage: 'https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/futbolss.jpg', title: 'Football' },
      { url: 'en_pigen.html', bgImage: 'https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/gpigen.jpg', title: 'Band "PIGEN"' },
      { url: 'en_teatraizrade.html', bgImage: 'https://res.cloudinary.com/dtyw9u8vv/image/upload/f_auto,q_auto/TIAutobuss.jpg', title: 'Theater Performance "The Bus"' }
    ];

    function generetRandomProjektus() {
      const gridContainer = document.querySelector('.suggested-grid');
      if (!gridContainer) return;

      // Iegūstam tīru pašreizējā faila nosaukumu
      const pasreizejaisFails = window.location.pathname.split('/').pop();

      // Noņemam pašreizējo lapu no ieteikumiem, lai nedublējas
      const pieejamieProjekti = visiProjekti.filter(p => p.url !== pasreizejaisFails);

      // Samaisām nejaušā secībā
      const samaisiti = pieejamieProjekti.sort(() => 0.5 - Math.random());

      // Paņemam 2 random projektus
      const izveletieProjekti = samaisiti.slice(0, 2);

      // Iztīrām veco kodu un ieliekam jaunos random darbus
      gridContainer.innerHTML = '';
      
      izveletieProjekti.forEach(projekts => {
        const cardHTML = `
          <a href="${projekts.url}" class="work-card">
            <div class="card-bg" style="background-image: url('${projekts.bgImage}');"></div>
            <div class="card-info">
              <h2>${projekts.title}</h2>
              <span class="card-category">View project</span>
            </div>
          </a>
        `;
        gridContainer.innerHTML += cardHTML;
      });
    }

    // Palaižam tiklīdz lapa ir gatava
    window.addEventListener('DOMContentLoaded', generetRandomProjektus);
  </script>

</body>
